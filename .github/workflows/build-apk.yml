name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create local.properties
        run: |
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" > local.properties
          echo "TG_GROUP_ID=${{ secrets.TG_GROUP_ID }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # This is the critical fix: Running the build and then searching for the file
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: List all files to find APK (Debug Tool)
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # We use a broad pattern to capture the APK wherever Gradle decided to put it
          path: "**/*.apk"
          if-no-files-found: error